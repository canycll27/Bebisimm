<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynep'e Özel ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1.5s ease-in-out;
        }
        /* Giriş Ekranı */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0b1a 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: all 1s ease-in-out;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(235, 64, 121, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #ff477e;
            letter-spacing: 2px;
            font-size: 24px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 20px;
            margin: 15px 0;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .login-box input:focus {
            border-color: #ff477e;
            box-shadow: 0 0 15px rgba(255, 71, 126, 0.5);
        }
        .login-box button {
            padding: 12px 35px;
            border: none;
            background: linear-gradient(45deg, #ff477e, #ff7096);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            transition: 0.3s;
        }
        .login-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 71, 126, 0.6);
        }
        /* Ana İçerik Ekranı */
        #main-content {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        /* Arka Plandaki Kayıp Patlayan Yazılar */
        .floating-text {
            position: absolute;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 1;
            text-shadow: 0 0 8px rgba(255, 71, 126, 0.6);
            animation: floatBackground 8s linear infinite;
        }
        @keyframes floatBackground {
            0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }
        /* Ana Merkez Kartı */
        .main-card {
            z-index: 10;
            max-width: 450px;
            margin: 0 20px;
            padding: 35px;
            background: rgba(11, 11, 11, 0.55);
            border-radius: 25px;
            border: 2px solid rgba(255, 71, 126, 0.5);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 71, 126, 0.4);
            animation: pulseGlow 3s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 30px rgba(255, 71, 126, 0.3); }
            100% { box-shadow: 0 0 60px rgba(255, 71, 126, 0.6); border-color: #ff7096; }
        }
        .main-card h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #ff477e, #ff85a2, #ff0a54);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .main-card p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #fff;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        /* Efekt Parçacıkları */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
            z-index: 100;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
        /* Müzik Kontrolü */
        #music-control {
            position: fixed;
            bottom: 20px; right: 20px;
            background: rgba(11, 11, 11, 0.8);
            border: 1px solid #ff477e;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            z-index: 1000;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Giriş Şifresi? ✨</h2>
            <input type="password" id="password-input" placeholder="Şifreyi yaz kanka...">
            <br>
            <button onclick="checkPassword()">Giriş Yap</button>
        </div>
    </div>

    <!-- ANA İÇERİK EKRANI -->
    <div id="main-content">
        <div class="main-card">
            <h1>ZEYNEP ❤️</h1>
            <p>Sen benim hayatımda başıma gelen en güzel, en çılgın şeysin. İyi ki varsın, iyi ki benimlesin! Dünyanın en şanslı adamı sayende benim.</p>
            <p style="font-size: 0.85rem; color: #ff7096; letter-spacing: 1px;">Ekrana dokun, aşkımız patlasın! 💥</p>
        </div>
    </div>

    <!-- Müzik Kontrolü -->
    <button id="music-control" onclick="toggleMusic()">🎵 Müziği Durdur</button>

    <!-- ŞARKI BURAYA GELECEK -->
    <!-- Kendi mp3 dosyanı yüklersen src="sarki.mp3" yapabilirsin -->
    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <script>
        // Patlayacak kelimeler listesi
        const words = ["ZEYNEP", "SENİ SEVİYORUM", "HATUNUM", "ÖMRÜM", "İYİ Kİ VARSIN", "MELEĞİM", "DÜNYAM", "EFSANEM"];

        function checkPassword() {
            const password = document.getElementById('password-input').value;
            
            if (password.toLowerCase() === 'zeynep') {
                // Giriş ekranını yavaşça kapat
                document.getElementById('login-screen').style.opacity = '0';
                
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    
                    // FOTOĞRAFI ARKA PLANA GÖMÜYORUZ (Karartma efektli)
                    document.body.style.background = "linear-gradient(rgba(11, 11, 11, 0.55), rgba(11, 11, 11, 0.55)), url('sevgilim.png')";
                    document.body.style.backgroundSize = "cover";
                    document.body.style.backgroundPosition = "center";
                    document.body.style.backgroundAttachment = "fixed";

                    const mainContent = document.getElementById('main-content');
                    mainContent.style.display = 'flex';
                    
                    // Ana içeriği yavaşça görünür yap
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                    }, 50);
                    
                    startMusic();
                    setInterval(createFloatingText, 500);
                }, 1000);
            } else {
                alert('Yanlış şifre kanka! Zeynep olduğuna emin miyiz? 😎');
            }
        }

        // Müzik Fonksiyonları
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-control');

        function startMusic() {
            music.play().catch(e => console.log("Otomatik oynatma engellendi."));
            musicBtn.style.display = 'block';
        }

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.innerText = "🎵 Müziği Durdur";
            } else {
                music.pause();
                musicBtn.innerText = "🎵 Müziği Başlat";
            }
        }

        // Arka plan kelime yağmuru
        function createFloatingText() {
            const textElement = document.createElement('div');
            textElement.classList.add('floating-text');
            textElement.innerText = words[Math.floor(Math.random() * words.length)];
            
            textElement.style.left = Math.random() * 90 + 'vw';
            textElement.style.fontSize = (Math.random() * 1.8 + 1.2) + 'rem';
            textElement.style.animationDuration = (Math.random() * 4 + 4) + 's';
            
            document.getElementById('main-content').appendChild(textElement);
            
            setTimeout(() => {
                textElement.remove();
            }, 8000);
        }

        // Ekrana tıklayınca havai fişek/kalp patlama efekti
        document.addEventListener('click', function(e) {
            if (document.getElementById('login-screen').style.display !== 'none') return;

            const particleCount = 25;
            const colors = ['#ff477e', '#ff7096', '#ff0a54', '#ff85a2', '#ffffff', '#00f0ff'];
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 160 + 60;
                const mx = Math.cos(angle) * velocity + 'px';
                const my = Math.sin(angle) * velocity + 'px';
                
                particle.style.setProperty('--mx', mx);
                particle.style.setProperty('--my', my);
                
                const size = Math.random() * 8 + 4 + 'px';
                particle.style.width = size;
                particle.style.height = size;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
                
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 800);
            }
        });
    </script>
</body>
</html>
